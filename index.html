<style>
:root {
  --bg:#060D09; --card:#0C1510; --card2:#101A13; --border:#1C2B1F;
  --green:#1DB954; --gd:#169040; --glow:rgba(29,185,84,0.25);
  --text:#EEF7F0; --muted:#6B8F72; --muted2:#3D5C43;
  --gold:#F5C842; --red:#F04E4E; --blue:#5BC8F5;
  --purple:#B57BF7; --orange:#F5874E;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
#app{max-width:430px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,16px);}
.screen::-webkit-scrollbar{display:none;}

/* NAV */
.nav{display:flex;justify-content:space-around;align-items:center;padding:10px 0 calc(10px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);background:var(--card);flex-shrink:0;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:6px 18px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;position:relative;}
.nav-btn.active{color:var(--green);background:rgba(29,185,84,.12);}
.nav-icon{font-size:22px;line-height:1;}
.nav-dot{position:absolute;top:4px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green);}

/* HEADER */
.hdr{background:linear-gradient(170deg,#0D2010,var(--bg));padding:calc(env(safe-area-inset-top,12px) + 16px) 22px 24px;}

/* CARDS */
.card{background:var(--card2);border:1px solid var(--border);border-radius:18px;padding:16px;}
.card-green{background:rgba(29,185,84,.08);border-color:rgba(29,185,84,.35);}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--gd));color:#000;box-shadow:0 6px 20px var(--glow);}
.btn-primary:disabled{background:var(--border);color:var(--muted);box-shadow:none;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-danger{background:#1A0808;border:1px solid #440000;color:var(--red);}
.btn-small{padding:9px 18px;width:auto;font-size:13px;border-radius:12px;}

/* INPUTS */
.inp-wrap{margin-bottom:14px;}
.inp-label{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:8px;}
.inp-row{position:relative;}
.inp-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.inp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px 14px 14px 44px;color:var(--text);font-size:15px;outline:none;font-family:'DM Sans',sans-serif;}
.inp:focus{border-color:var(--green);}
.inp::placeholder{color:var(--muted2);}
.inp.no-icon{padding-left:16px;}

/* TAG */
.tag{display:inline-block;background:rgba(29,185,84,.15);border:1px solid rgba(29,185,84,.4);border-radius:20px;padding:3px 10px;color:var(--green);font-size:11px;font-weight:600;}

/* STEP BAR */
.steps{display:flex;gap:6px;margin-bottom:24px;}
.step-col{flex:1;display:flex;flex-direction:column;gap:4px;}
.step-bar{height:3px;border-radius:3px;background:var(--border);transition:background .3s;}
.step-bar.done{background:var(--green);}
.step-lbl{font-size:10px;font-weight:600;color:var(--muted);}
.step-lbl.active{color:var(--green);}

/* SERVICE GRID */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.svc-card{border-radius:18px;padding:14px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid transparent;transition:transform .15s;}
.svc-card:active{transform:scale(.95);}
.svc-icon{font-size:24px;}
.svc-label{font-size:10px;font-weight:600;text-align:center;line-height:1.3;}

/* TX TILE */
.tx-tile{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;}
.tx-ico{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tx-info{flex:1;margin-left:12px;}
.tx-name{font-size:13px;font-weight:600;color:var(--text);}
.tx-date{font-size:11px;color:var(--muted);margin-top:2px;}
.tx-amt{font-size:13px;font-weight:700;color:var(--red);}
.tx-ok{font-size:10px;color:var(--green);margin-top:2px;text-align:right;}

/* FILTER TABS */
.filters{display:flex;gap:8px;margin-bottom:18px;}
.filter-btn{padding:7px 18px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.filter-btn.active{background:rgba(29,185,84,.18);border-color:var(--green);color:var(--green);}

/* PROVIDER TILE */
.prov-tile{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:16px;border:1px solid var(--border);background:var(--card2);cursor:pointer;margin-bottom:10px;transition:all .2s;}
.prov-tile.selected{border-color:var(--green);background:rgba(29,185,84,.1);}
.prov-tile.linked{opacity:.5;cursor:default;}
.prov-logo{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-right:13px;}
.prov-name{font-size:14px;font-weight:600;color:var(--text);}
.prov-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* AMOUNT PRESETS */
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.preset{padding:10px 4px;border-radius:13px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;transition:all .15s;}
.preset.active{border-color:var(--green);background:rgba(29,185,84,.18);color:var(--green);}

/* PAY METHODS */
.methods{display:flex;gap:8px;margin-bottom:18px;}
.method{flex:1;padding:11px 4px;border-radius:14px;border:1px solid var(--border);background:var(--card2);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s;}
.method.active{border-color:var(--green);background:rgba(29,185,84,.12);}
.method-ico{font-size:18px;}
.method-lbl{font-size:10px;font-weight:600;color:var(--muted);}
.method.active .method-lbl{color:var(--green);}

/* CONTACT TILE */
.contact{display:flex;align-items:center;padding:13px 15px;border-radius:16px;border:1px solid var(--border);background:var(--card2);cursor:pointer;margin-bottom:8px;transition:all .2s;}
.contact.selected{border-color:var(--green);background:rgba(29,185,84,.1);}
.contact-avatar{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-right:12px;}
.contact-name{font-size:14px;font-weight:600;color:var(--text);}
.contact-phone{font-size:11px;color:var(--muted);margin-top:2px;}

/* SUMMARY ROW */
.sum-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
.sum-key{color:var(--muted);}
.sum-val{color:var(--text);}
.sum-val.green{color:var(--green);font-weight:700;}

/* SUCCESS */
.success-circle{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gd));display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 22px;box-shadow:0 0 40px var(--glow);animation:pop .4s ease both;}
@keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* LOGO SCREEN */
.logo-box{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,var(--green),var(--gd));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 18px;box-shadow:0 0 30px var(--glow);}

/* LANG */
.lang-tile{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-radius:18px;border:1px solid var(--border);background:var(--card2);cursor:pointer;margin-bottom:12px;transition:all .2s;}
.lang-tile.selected{border-color:var(--green);background:rgba(29,185,84,.1);}
.lang-check{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gd));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;}

/* WALLET ADD BTN */
.add-btn{flex:1;padding:18px 10px;border-radius:18px;border:1px solid;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:transparent;}
.add-btn-icon{font-size:28px;}
.add-btn-label{font-size:13px;font-weight:700;}
.add-btn-sub{font-size:10px;color:var(--muted);text-align:center;line-height:1.4;}

/* TOOLTIP */
.tip{border-radius:14px;padding:12px 14px;}
.tip-gold{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.3);}

/* PROFILE MENU */
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:16px;border:1px solid var(--border);background:var(--card2);margin-bottom:8px;cursor:pointer;}
.menu-ico{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:13px;flex-shrink:0;}
.menu-name{font-size:14px;font-weight:600;color:var(--text);}
.menu-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* BACK BTN */
.back-btn{background:var(--border);border:none;border-radius:12px;color:var(--text);padding:8px 14px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;margin-bottom:14px;}

/* UTILS */
.row{display:flex;align-items:center;justify-content:space-between;}
.col{display:flex;flex-direction:column;}
.gap8{gap:8px;}
.mb4{margin-bottom:4px;}
.mb8{margin-bottom:8px;}
.mb10{margin-bottom:10px;}
.mb12{margin-bottom:12px;}
.mb14{margin-bottom:14px;}
.mb16{margin-bottom:16px;}
.mb18{margin-bottom:18px;}
.mb20{margin-bottom:20px;}
.mb22{margin-bottom:22px;}
.p20{padding:20px;}
.syne{font-family:'Syne',sans-serif;}
.f22{font-size:22px;font-weight:800;}
.f18{font-size:18px;font-weight:800;}
.f15{font-size:15px;font-weight:700;}
.f13{font-size:13px;}
.f12{font-size:12px;}
.f11{font-size:11px;}
.center{text-align:center;}
.muted{color:var(--muted);}
.green{color:var(--green);}
.red{color:var(--red);}
.sep{height:1px;background:var(--border);margin:10px 0;}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fade-in{animation:fadeUp .35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<script>
// ── STATE ─────────────────────────────────────────────────
const state = {
  page: 'login',
  tab: 'home',
  flow: null,
  lang: localStorage.getItem('lang') || 'sw',
  user: null,       // set after Pi auth: {name, piUid, accessToken}
  linked: [],
  txs: [],          // loaded per-user from localStorage after login
  selService: null,
  sendPhone: '',
  sendStep: 1,
  linkType: null,
  linkStep: 1,
  linkSel: null,
  successType: 'pay',
  filter: 'all',
  langChoice: null,
  registerStep: 1,
  balance: 0,       // loaded per-user from localStorage after login
};

// ── PER-USER PERSISTENCE ──────────────────────────────────
// All data keyed by Pi UID so each person has their own data.

function userKey(suffix) {
  const uid = state.user?.piUid || 'guest';
  return 'my_' + uid + '_' + suffix;
}

function saveUserData() {
  if (!state.user) return;
  localStorage.setItem(userKey('balance'), JSON.stringify(state.balance));
  localStorage.setItem(userKey('txs'),     JSON.stringify(state.txs));
  localStorage.setItem(userKey('linked'),  JSON.stringify(state.linked));
}

function loadUserData() {
  const savedBal    = localStorage.getItem(userKey('balance'));
  const savedTxs    = localStorage.getItem(userKey('txs'));
  const savedLinked = localStorage.getItem(userKey('linked'));
  state.balance = savedBal    ? JSON.parse(savedBal)    : 0;
  state.txs     = savedTxs    ? JSON.parse(savedTxs)    : [];
  state.linked  = savedLinked ? JSON.parse(savedLinked) : [];
}

// ── PI NETWORK AUTH ───────────────────────────────────────
// piReady: true once Pi.init resolves; piUser: validated user object
let piReady = false;
let piUser  = null;

function setPiStatus(msg, isError) {
  const el = document.getElementById('pi-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? 'var(--red)' : 'var(--muted)';
}

function setPiBtnState(loading) {
  const b = document.getElementById('pi-auth-btn');
  if (!b) return;
  b.disabled = loading;
  b.innerHTML = loading
    ? `<span class="spin">⟳</span> Inaingia Pi...`
    : `<img src="https://minepi.com/favicon.ico" style="width:18px;height:18px;border-radius:4px;"> Ingia na Pi Network`;
}

async function doPiAuth() {
  setPiBtnState(true);
  setPiStatus('Inawasiliana na Pi Network...', false);
  try {
    // 1. Ensure SDK is initialised (idempotent if already done)
    if (!piReady) {
      await Pi.init({ version: '2.0', sandbox: false });
      piReady = true;
    }

    // 2. Authenticate – request "username" scope
    const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
    const accessToken = auth.accessToken;

    setPiStatus('Inathibitisha na seva...', false);

    // 3. Validate token: call Pi platform /v2/me
    //    (no API key required for this bearer-token flow)
    const resp = await fetch('https://api.minepi.com/v2/me', {
      headers: { Authorization: `Bearer ${accessToken}` }
    });

    if (!resp.ok) throw new Error(`Pi /v2/me responded ${resp.status}`);
    const piData = await resp.json();

    // 4. Session established – store user and load their personal data
    piUser = piData;
    state.user = {
      name: piData.username || 'Pi User',
      phone: '',
      piUid: piData.uid,
      accessToken,
    };
    loadUserData();   // restore this user's balance, txs, linked accounts
    state.page = 'main';
    state.tab  = 'home';
    render();

  } catch (err) {
    console.error('Pi auth error:', err);
    setPiStatus('Imeshindwa kuingia: ' + (err.message || 'Jaribu tena'), true);
    setPiBtnState(false);
  }
}

// Called by Pi SDK when an incomplete payment is found at auth time.
// We MUST complete (or cancel) it via the backend — never silently ignore it.
async function onIncompletePayment(payment) {
  console.warn('Incomplete Pi payment found — completing via backend:', payment.identifier);
  try {
    const res = await fetch('/api/payments/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      // txid may be present if blockchain confirmed but app crashed before completion
      body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction?.txid || null }),
    });
    if (!res.ok) console.error('Backend failed to complete incomplete payment:', await res.text());
  } catch (err) {
    console.error('Network error completing incomplete payment:', err);
  }
}

    state.page='main';state.tab='home';state.registerStep=1;render();return;

async function doPayService(){
  const ref = document.getElementById('svc_ref')?.value.trim();
  const amt = document.getElementById('svc_amt')?.value.trim();
  if (!ref || !amt) return;

  const tzs   = parseFloat(amt.replace(/,/g, '')) || 0;
  const fee   = Math.max(200, Math.round(tzs * 0.005));
  const total = tzs + fee;
  const svc   = SVCS.find(s => s.id === state.selService);

  const payBtn = document.querySelector('#svc-pay-btn .btn');
  function resetBtn() {
    if (payBtn) { payBtn.disabled = false; payBtn.innerHTML = `π Lipa kwa Pi — TZS ${fmt(total)}`; }
  }

  if (payBtn) { payBtn.disabled = true; payBtn.innerHTML = `<span class="spin">⟳</span> ${t('paying')}`; }

  // ── 1. Ensure Pi SDK is initialised before any Pi.createPayment call ──
  if (!piReady) {
    try {
      await Pi.init({ version: '2.0', sandbox: false });
      piReady = true;
    } catch(e) {
      alert('Pi SDK haijapatikana. Tumia Pi Browser.');
      resetBtn(); return;
    }
  }

  // ── 2. Fetch the canonical Pi amount from the backend ──
  //    This prevents the client from spoofing the price.
  let piAmount;
  try {
    const rateRes = await fetch('/api/payments/quote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tzs_amount: total, service: state.selService, serviceRef: ref }),
    });
    if (!rateRes.ok) throw new Error(`Quote error ${rateRes.status}`);
    const { pi_amount } = await rateRes.json();
    piAmount = pi_amount;
  } catch(e) {
    console.error('Failed to fetch Pi quote:', e);
    alert('Imeshindwa kupata bei ya Pi. Tafadhali jaribu tena.');
    resetBtn(); return;
  }

  // ── 3. Build payment payload ──
  const paymentData = {
    amount:   piAmount,
    memo:     `Malipo Yetu — ${svc ? t(svc.key) : state.selService} (${ref})`,
    metadata: {
      service:    state.selService,
      serviceRef: ref,
      tzs_amount: total,
      piUid:      state.user?.piUid || '',
    },
  };

  // ── 4. Create payment with all required callbacks ──
  Pi.createPayment(paymentData, {

    // Step A — SDK issues paymentId → server must approve before blockchain signs
    onReadyForServerApproval(paymentId) {
      fetch('/api/payments/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId }),
      }).catch(err => {
        console.error('Approval POST failed:', err);
        // Do NOT reset button here — the SDK is still waiting; let onError handle UI
      });
    },

    // Step B — Blockchain confirms; server must complete to transfer Pi to app wallet
    onReadyForServerCompletion(paymentId, txid) {
      fetch('/api/payments/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId, txid }),
      })
      .then(r => { if (!r.ok) throw new Error(`Complete failed ${r.status}`); return r.json(); })
      .then(() => {
        // Fully settled — record locally and navigate to success
        state.txs.unshift({
          id:       paymentId,
          icon:     svc ? svc.icon : '💳',
          name:     svc ? t(svc.key) : state.selService,
          ref,
          amt:      total,
          type:     'pay',
          date:     'Sasa hivi',
          piAmount,
          txid,
        });
        saveUserData();
        state._preset = ''; state._method = 'pi';
        state.successType = 'pay';
        startFlow('success');
      })
      .catch(err => {
        console.error('Completion error:', err);
        alert('Malipo yamefanikiwa kwenye blockchain lakini kuna hitilafu ya seva. Wasiliana na msaada wetu na nambari: ' + txid);
        resetBtn();
      });
    },

    onCancel(paymentId) {
      console.log('Pi payment cancelled by user:', paymentId);
      resetBtn();
    },

    onError(error, payment) {
      console.error('Pi payment error:', error, payment);
      alert('Hitilafu ya malipo: ' + (error?.message || error));
      resetBtn();
    },
  });
}

            <div class="muted f12 mt4">Jumla ya Pi</div>
          </div>
          <div style="text-align:right;">
            <div class="syne" style="font-size:22px;font-weight:800;">\${piCount}</div>
            <div class="muted f12 mt4">Malipo</div>
          </div>
        </div>
      </div>\`;
    })()}
    ${menu.map(m=>`<div class="menu-item" onclick="${m.action||''}">
      <div style="display:flex;align-items:center;">
        <div class="menu-ico" style="background:${m.color}18;">${m.icon}</div>
        <div><div class="menu-name">${m.label}</div><div class="menu-sub">${m.sub}</div></div>
      </div>
      <span style="color:${m.action?'var(--green)':'var(--muted)'};font-size:20px;">›</span>
    </div>`).join('')}
    ${btn(t('logout'),'doLogout()','btn btn-danger')}
    <div style="height:16px;"></div>
  </div>`;
}

function doLogout(){
  state.user=null;
  state.page='login';
  state.linked=[];
  state.txs=[];
  state.balance=0;
  render();
}

// ── SUCCESS ───────────────────────────────────────────────
function renderSuccess(){
  const isSend=state.successType==='send';
  const isLink=state.successType==='link';
  const txId='#TXN-'+uid();
  return `<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;">
    <div class="success-circle">${isSend?'↗️':'✓'}</div>
    <div class="syne" style="font-size:24px;font-weight:800;margin-bottom:8px;">${isSend?t('successSend'):t('successPay')}</div>
    <div class="muted f14" style="line-height:1.8;margin-bottom:28px;">${isSend?'Pesa zimetumwa kwa usalama.\nMpokeaji atapokea SMS sasa hivi.':'Muamala umekamilika kwa usalama.\nUtapokea uthibitisho kwa SMS.'}</div>
    <div class="card mb22" style="border-color:rgba(29,185,84,.3);width:100%;text-align:left;">
      ${[[t('txNum'),txId],[t('txTime'),now()],[t('txStatus'),t('txOk')]].map(([k,v])=>`<div class="sum-row mb8"><span class="sum-key">${k}</span><span class="sum-val">${v}</span></div>`).join('')}
    </div>
    ${btn(t('backHome'),`state.flow=null;state.tab='home';render()`)}
    <div style="height:10px;"></div>
    ${btn(t('receipt'),'','btn btn-ghost')}
  </div>`;
}

// ── NAVIGATION HELPERS ────────────────────────────────────
function go(dest){
  if(dest==='back'){
    if(state.page==='language'){ state.page=state._prevPage||'login'; render(); return; }
    state.page='login'; render(); return;
  }
  if(dest==='language'){ state._prevPage=state.page==='main'?'main':state.page; state.page='language'; render(); return; }
  if(dest==='register'){ state.registerStep=1; state.page='register'; render(); return; }
  if(dest==='login'){ state.page='login'; render(); return; }
}

function startFlow(type){ state.flow={type}; render(); }

// ── INIT ──────────────────────────────────────────────────
// Render login screen first (shows immediately), then auto-trigger Pi auth
render();

(async () => {
  try {
    // Show login screen with "connecting" status before SDK loads
    setPiStatus('Inaungana na Pi Network...', false);
    setPiBtnState(true);

    await Pi.init({ version: '2.0', sandbox: false });
    piReady = true;

    // Auto-authenticate as soon as SDK is ready
    await doPiAuth();
  } catch (err) {
    // SDK may not be available outside Pi Browser — fall back gracefully
    piReady = false;
    setPiStatus('Pi Browser inahitajika kwa Pi auth. Ingia kwa simu hapa chini.', true);
    setPiBtnState(false);
  }
})();
</script>
</body>
</html>
